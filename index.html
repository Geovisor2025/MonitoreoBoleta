        <style>
        html, body {
            background-color: #ffffff;
        }
        .ol-control > * {
            background-color: #f8f8f8!important;
            color: #312ada!important;
            border-radius: 0px;
        }
        .ol-attribution a, .gcd-gl-input::placeholder, .search-layer-input-search::placeholder {
            color: #312ada!important;
        }
        .search-layer-input-search {
            background-color: #f8f8f8!important;
        }
        .ol-control > *:focus, .ol-control >*:hover {
            background-color: rgba(248, 248, 248, 0.7)!important;
        } 
        .ol-control {
            background-color: rgba(255,255,255,.4) !important;
            padding: 2px !important;
        } 


.title-large,
.title-medium,
.title-small {
    background: linear-gradient(to right, red, blue);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text; /* Fallback para navegadores que lo soporten */
    color: transparent;

    margin: 0;
    text-align: left; /* o center, según diseño */
}

.title-large {
    font-size: 24px;
    font-weight: bold;
}

.title-medium {
    font-size: 18px;
    font-weight: 500;
}

.title-small {
    font-size: 14px;
    font-weight: normal;
}

.top-left-title {
    padding: 10px;
    background: rgba(255, 255, 255, 0.7); /* opcional: fondo translúcido */
    border-radius: 8px;
    display: flex;
    flex-direction: column;
    align-items: center; /* Centra horizontalmente */
    justify-content: center; /* Centra verticalmente si hay espacio */
    text-align: center;
}

#header {
    width: 100%;
    height: 90.4 px; /* o el alto que necesites */
    overflow: hidden;
    position: relative;
    margin: 0;
    padding: 0;
}

#header-img {
    width: 100%;
    height: 100%;
    object-fit: cover; /* Esto asegura que la imagen llene toda el área */
    display: block;
}


.ol-scale-line {
    position: absolute;
    bottom: 10px;
    left: 50%;
    background: rgba(255, 255, 255, 0.7);
    border-radius: 4px;
    padding: 2px 6px;
    font-size: 12px;
}


        </style>
